[package]
name = "logtailer"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "logtailer"
path = "src/main.rs"

[dependencies]
logtailer-server = { path = "crates/server" }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
axum = "0.7"
clap = { version = "4", features = ["derive"] }

[workspace]
resolver = "2"
members = [
    "crates/protocol",
    "crates/tail-engine",
    "crates/search-engine",
    "crates/server",
]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
tokio = { version = "1", features = ["full"] }
notify = "6"
memmap2 = "0.9"
