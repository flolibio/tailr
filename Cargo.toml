[workspace]
resolver = "2"
members = [
    "crates/protocol",
    "crates/tail-engine",
    "crates/search-engine",
    "crates/server",
]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
tokio = { version = "1", features = ["full"] }
notify = "6"
memmap2 = "0.9"
